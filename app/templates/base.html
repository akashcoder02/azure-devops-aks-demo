<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        {% block title %}
        Azure DevOps IDP
        {% endblock %}
    </title>

    <!-- Global CSS -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}"
    >

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/cards.css') }}"
    >


    <!-- Page Specific CSS -->

    {% block css %}
    {% endblock %}

</head>

<body>

    <div class="sidebar">

        <h2>Azure DevOps IDP</h2>

        <ul>

            <li>
                <a href="/">🏠 Dashboard</a>
            </li>

            <li>
                <a href="/platform">🚀 Platform</a>
            </li>

            <li>
                <a href="{{ url_for('platform_installations.platform_installations') }}">
                    🧩 Platform Installations
                </a>
            </li>

            <li>
                <a href="{{ url_for('devsecops.devsecops') }}">
                    🛡️ DevSecOps
                </a>
            </li>

            <li>
                <a href="/applications">📦 Applications</a>
            </li>

            <li>
                <a href="/infrastructure">☁ Infrastructure</a>
            </li>

            <li>
                <a href="/monitoring">📊 Observability</a>
            </li>

            <li>
                <a href="/logs">📜 Activity</a>
            </li>

            <li>
                <a href="/settings">⚙ Settings</a>
            </li>

            <li>
                <a href="/about">ℹ About</a>
            </li>

        </ul>

    </div>

    <div class="main-content">

        {% block content %}
        {% endblock %}

    </div>

    {% block scripts %}
    {% endblock %}

</body>

</html>
