apiVersion: apps/v1
kind: Deployment

metadata:
  name: tetris

spec:
  replicas: 1

  selector:
    matchLabels:
      app: tetris

  template:
    metadata:
      labels:
        app: tetris

    spec:

      containers:
      - name: tetris

        image: agdevopsacr2026.azurecr.io/tetris:c50bf85173951ab396ca4dcf8bf9084e5a1b328b

        imagePullPolicy: Always

        ports:
        - containerPort: 80

