apiVersion: apps/v1
kind: Deployment

metadata:
  name: tetris

spec:
  replicas: 1

  selector:
    matchLabels:
      app: tetris

  template:
    metadata:
      labels:
        app: tetris

    spec:

      containers:
      - name: tetris

        image: agdevopsacr2026.azurecr.io/tetris:e07006b8a13864feafbb540664adcc44312add7b

        imagePullPolicy: Always

        ports:
        - containerPort: 80

