apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass

metadata:
  name: azure-keyvault

spec:
  provider: azure

  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: ea9d6d2c-685f-4189-987a-aae969a9ae22

    keyvaultName: "agdevopskv2026"
    tenantId: "494d8408-c1d7-4771-8716-be4275838741"

    objects: |
      array:
        - |
          objectName: app-secret
          objectType: secret
