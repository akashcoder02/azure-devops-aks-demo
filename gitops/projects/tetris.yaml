apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tetris
  namespace: argocd

spec:
  project: default

  source:
    repoURL: git@github.com:akashcoder02/azure-devops-aks-demo.git
    targetRevision: main
    path: gitops/applications/tetris

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
