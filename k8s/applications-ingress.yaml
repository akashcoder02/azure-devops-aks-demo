apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: idp-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"

spec:
  ingressClassName: nginx

  rules:
    - http:
        paths:

          - path: /tic-tac-toe(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: tic-tac-toe
                port:
                  number: 80

          - path: /tetris(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: tetris
                port:
                  number: 80