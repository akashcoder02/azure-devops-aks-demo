name: Destroy Monitoring

on:
  workflow_dispatch:

jobs:
  destroy-monitoring:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS Credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER }} \
            --overwrite-existing

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Terraform Init
        working-directory: terraform/addons/monitoring
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform/addons/monitoring
        run: terraform validate

      - name: Terraform Destroy
        working-directory: terraform/addons/monitoring
        run: terraform destroy -auto-approve

      - name: Verify Monitoring Removed
        run: |
          echo "Checking namespace..."

          kubectl get namespace monitoring || echo "Namespace removed."

          echo ""
          echo "Checking Helm releases..."

          helm list -n monitoring || true

      - name: Destruction Summary
        run: |
          echo ""
          echo "===================================================="
          echo "      MONITORING DESTROY COMPLETED"
          echo "===================================================="
