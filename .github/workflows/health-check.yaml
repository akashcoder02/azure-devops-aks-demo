name: Application Health Check

on:
  workflow_dispatch:
    inputs:
      application_name:
        description: "Application Name"
        required: true
        default: "tic-tac-toe"
        type: choice
        options:
          - tic-tac-toe
          - tetris

jobs:

  health-check:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS Credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER }} \
            --overwrite-existing

      - name: Deployment Status
        run: |
          echo "========================================"
          echo "DEPLOYMENT"
          echo "========================================"
          kubectl get deployment ${{ github.event.inputs.application_name }} -o wide

      - name: ReplicaSet Status
        run: |
          echo "========================================"
          echo "REPLICASETS"
          echo "========================================"
          kubectl get rs -l app=${{ github.event.inputs.application_name }}

      - name: Pod Health
        run: |
          echo "========================================"
          echo "PODS"
          echo "========================================"
          kubectl get pods \
            -l app=${{ github.event.inputs.application_name }} \
            -o wide

      - name: Service Health
        run: |
          echo "========================================"
          echo "SERVICES"
          echo "========================================"
          kubectl get svc ${{ github.event.inputs.application_name }}

      - name: Ingress Health
        run: |
          echo "========================================"
          echo "INGRESS"
          echo "========================================"
          kubectl get ingress idp-ingress

      - name: Node Health
        run: |
          echo "========================================"
          echo "NODES"
          echo "========================================"
          kubectl get nodes

      - name: Recent Events
        run: |
          echo "========================================"
          echo "RECENT EVENTS"
          echo "========================================"
          kubectl get events \
            --sort-by=.metadata.creationTimestamp \
            | tail -20

      - name: Rollout Status
        run: |
          echo "========================================"
          echo "ROLLOUT STATUS"
          echo "========================================"
          kubectl rollout status deployment/${{ github.event.inputs.application_name }} --timeout=30s

      - name: Current Image
        run: |
          echo "========================================"
          echo "DEPLOYED IMAGE"
          echo "========================================"
          kubectl get deployment \
            ${{ github.event.inputs.application_name }} \
            -o jsonpath='{.spec.template.spec.containers[0].image}'
          echo ""

      - name: Health Check Completed
        run: |
          echo ""
          echo "Application Health Check Completed Successfully."
          echo ""
          echo "Application: ${{ github.event.inputs.application_name }}"