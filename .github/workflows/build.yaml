name: Build Docker Image

on:
  workflow_dispatch:
    inputs:
      application_name:
        description: "Application to build"
        required: true
        default: "tic-tac-toe"
        type: choice
        options:
          - tic-tac-toe
          - tetris

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build Docker Image
        run: |
          docker build \
          -t ${{ secrets.ACR_NAME }}.azurecr.io/${{ github.event.inputs.application_name }}:${{ env.IMAGE_TAG }} \
          ./applications/${{ github.event.inputs.application_name }}

      - name: Push Docker Image
        run: |
          docker push \
          ${{ secrets.ACR_NAME }}.azurecr.io/${{ github.event.inputs.application_name }}:${{ env.IMAGE_TAG }}

      - name: Build Completed
        run: |
          echo ""
          echo "Docker image pushed successfully."
          echo ""
          echo "Image Tag:"
          echo "${{ env.IMAGE_TAG }}"
          echo ""
          echo "Repository:"
          echo "${{ secrets.ACR_NAME }}.azurecr.io/${{ github.event.inputs.application_name }}:${{ env.IMAGE_TAG }}"