name: Build Docker Image

on:

  workflow_dispatch:
    inputs:
      application_name:
        description: "Application to build"
        required: true
        default: "tic-tac-toe"
        type: choice
        options:
          - tic-tac-toe
          - tetris

  workflow_call:

    inputs:

      application_name:
        description: "Application to build"
        required: true
        type: string

    outputs:

      image_tag:
        description: "Generated Image Tag"
        value: ${{ jobs.build.outputs.image_tag }}

      application_name:
        description: "Application Name"
        value: ${{ jobs.build.outputs.application_name }}

env:
  IMAGE_TAG: ${{ github.sha }}
  APPLICATION_NAME: ${{ inputs.application_name || github.event.inputs.application_name }}

jobs:
  build:

    runs-on: ubuntu-latest

    outputs:

      image_tag: ${{ steps.image.outputs.image_tag }}

      application_name: ${{ steps.application.outputs.application_name }}

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Export Image Tag

        id: image

        run: |

          echo "image_tag=${{ env.IMAGE_TAG }}" >> $GITHUB_OUTPUT

      - name: Export Application Name

        id: application

        run: |

          echo "application_name=${{ env.APPLICATION_NAME }}" >> $GITHUB_OUTPUT

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}

      - name: Show Dockerfile
        run: |
          cat applications/${{ env.APPLICATION_NAME }}/Dockerfile

      - name: Build Docker Image
        run: |
          docker build \
          -t ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.APPLICATION_NAME }}:${{ env.IMAGE_TAG }} \
          ./applications/${{ env.APPLICATION_NAME }}

      - name: Show Docker Image
        run: |
          docker image ls \
            ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.APPLICATION_NAME }}

      - name: Push Docker Image
        run: |
          docker push \
          ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.APPLICATION_NAME }}:${{ env.IMAGE_TAG }}

      - name: Verify Image in ACR
        run: |
          echo ""
          echo "Repository Tags"
          echo "----------------------------------------"

          az acr repository show-tags \
            --name ${{ secrets.ACR_NAME }} \
            --repository ${{ env.APPLICATION_NAME }} \
            --output table

      - name: Show Image Manifest
        run: |
          az acr repository show-manifests \
            --name ${{ secrets.ACR_NAME }} \
            --repository ${{ env.APPLICATION_NAME }} \
            --query "[0].{Digest:digest,Tags:tags}" \
            -o table

      - name: Build Summary
        run: |
          echo ""
          echo "========================================================"
          echo "BUILD COMPLETED"
          echo "========================================================"

          echo "Status      : SUCCESS"
          echo "Application : ${{ env.APPLICATION_NAME }}"
          echo "Registry    : ${{ secrets.ACR_NAME }}"
          echo "Image Tag   : ${{ env.IMAGE_TAG }}"
          echo "Repository  : ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.APPLICATION_NAME }}:${{ env.IMAGE_TAG }}"

          echo ""
          echo "Docker image pushed successfully."

          echo "========================================================"