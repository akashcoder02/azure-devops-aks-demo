name: Build Docker Image

on:
  workflow_dispatch:
    inputs:
      application_name:
        description: "Application to build"
        required: true
        default: "tic-tac-toe"
        type: choice
        options:
          - tic-tac-toe
          - tetris

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}

      - name: Show Dockerfile
        run: |
          cat applications/${{ github.event.inputs.application_name }}/Dockerfile

      - name: Build Docker Image
        run: |
          docker build \
          -t ${{ secrets.ACR_NAME }}.azurecr.io/${{ github.event.inputs.application_name }}:${{ env.IMAGE_TAG }} \
          ./applications/${{ github.event.inputs.application_name }}

      - name: Show Docker Image
        run: |
          docker image ls \
            ${{ secrets.ACR_NAME }}.azurecr.io/${{ github.event.inputs.application_name }}

      - name: Push Docker Image
        run: |
          docker push \
          ${{ secrets.ACR_NAME }}.azurecr.io/${{ github.event.inputs.application_name }}:${{ env.IMAGE_TAG }}

      - name: Verify Image in ACR
        run: |
          echo ""
          echo "Repository Tags"
          echo "----------------------------------------"

          az acr repository show-tags \
            --name ${{ secrets.ACR_NAME }} \
            --repository ${{ github.event.inputs.application_name }} \
            --output table

      - name: Show Image Manifest
        run: |
          az acr repository show-manifests \
            --name ${{ secrets.ACR_NAME }} \
            --repository ${{ github.event.inputs.application_name }} \
            --query "[0].{Digest:digest,Tags:tags}" \
            -o table

      - name: Build Summary
        run: |
          echo ""
          echo "========================================================"
          echo "BUILD COMPLETED"
          echo "========================================================"

          echo "Status      : SUCCESS"
          echo "Application : ${{ github.event.inputs.application_name }}"
          echo "Registry    : ${{ secrets.ACR_NAME }}"
          echo "Image Tag   : ${{ env.IMAGE_TAG }}"
          echo "Repository  : ${{ secrets.ACR_NAME }}.azurecr.io/${{ github.event.inputs.application_name }}:${{ env.IMAGE_TAG }}"

          echo ""
          echo "Docker image pushed successfully."

          echo "========================================================"