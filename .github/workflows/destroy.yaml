name: Destroy Platform

on:
  workflow_dispatch:

env:
  KEYVAULT_NAME: agdevopskv2026

jobs:

  destroy:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: terraform destroy -auto-approve

      - name: Wait for Key Vault Soft Delete
        working-directory: .
        run: |
          echo "Waiting for Key Vault to enter deleted state..."

          for i in {1..24}; do

            if az keyvault list-deleted \
              --query "[?name=='$KEYVAULT_NAME'].name" \
              -o tsv | grep -qx "$KEYVAULT_NAME"; then

              echo "Key Vault is now soft deleted."
              exit 0
            fi

            sleep 5

          done

          echo "Key Vault did not appear in deleted state within timeout."
          exit 1

      - name: Destroy Completed
        working-directory: .
        run: |
          echo ""
          echo "========================================"
          echo "Platform destroyed successfully."
          echo "========================================"