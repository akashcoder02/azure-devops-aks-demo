name: Install Argo CD

on:
  workflow_dispatch:

env:
  RESOURCE_GROUP: rg-devops-demo
  AKS_NAME: aks-devops-demo

jobs:

  install-argocd:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Verify AKS Cluster
        run: |
          echo "Checking AKS Cluster..."

          az aks show \
            --resource-group $RESOURCE_GROUP \
            --name $AKS_NAME \
            --output table

      - name: Get AKS Credentials
        run: |
          az aks get-credentials \
            --resource-group $RESOURCE_GROUP \
            --name $AKS_NAME \
            --overwrite-existing

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Terraform Init
        working-directory: terraform/addons/argocd
        run: terraform init

      - name: Terraform Format Check
        working-directory: terraform/addons/argocd
        run: terraform fmt -check

      - name: Terraform Validate
        working-directory: terraform/addons/argocd
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform/addons/argocd
        run: terraform plan

      - name: Terraform Apply
        working-directory: terraform/addons/argocd
        run: terraform apply -auto-approve

      - name: Wait for Argo CD
        run: |
          echo "Waiting for Argo CD Pods..."

          echo "Waiting for Argo CD Server..."
          kubectl rollout status deployment/argocd-server -n argocd --timeout=300s

          echo "Waiting for Repo Server..."
          kubectl rollout status deployment/argocd-repo-server -n argocd --timeout=300s

          echo "Waiting for Application Controller..."
          kubectl rollout status statefulset/argocd-application-controller -n argocd --timeout=300s

          echo "Waiting for ApplicationSet Controller..."
          kubectl rollout status deployment/argocd-applicationset-controller -n argocd --timeout=300s

          echo "Waiting for Dex..."
          kubectl rollout status deployment/argocd-dex-server -n argocd --timeout=300s

          echo "Waiting for Notifications..."
          kubectl rollout status deployment/argocd-notifications-controller -n argocd --timeout=300s

      - name: Configure Git Repository
        run: |
          kubectl apply -f gitops/repository-secret.yaml

      - name: Create GitOps Applications
        run: |
          kubectl apply -f gitops/projects/

      - name: Wait for Applications
        run: |
          sleep 15

      - name: Verify Applications
        run: |
          kubectl get applications -n argocd

      - name: Verify Namespace
        run: |
          kubectl get namespace argocd

      - name: Verify Pods
        run: |
          kubectl get pods -n argocd -o wide

      - name: Verify Services
        run: |
          kubectl get svc -n argocd

      - name: Verify Deployments
        run: |
          kubectl get deployments -n argocd

      - name: Show Helm Release
        run: |
          helm list -n argocd

      - name: Installation Summary
        run: |

          echo ""
          echo "===================================================="
          echo "        ARGO CD INSTALLATION SUCCESSFUL"
          echo "===================================================="

          echo ""
          echo "Namespace : argocd"

          echo ""
          echo "Helm Releases"
          helm list -n argocd

          echo ""
          echo "Pods"
          kubectl get pods -n argocd

          echo ""
          echo "Services"
          kubectl get svc -n argocd

          echo ""
          echo "----------------------------------------------------"
          echo "Initial Username"
          echo "----------------------------------------------------"

          echo "admin"

          echo ""
          echo "----------------------------------------------------"
          echo "Get Initial Password"
          echo "----------------------------------------------------"

          echo "kubectl -n argocd get secret argocd-initial-admin-secret \\"
          echo "-o jsonpath='{.data.password}' | base64 -d"