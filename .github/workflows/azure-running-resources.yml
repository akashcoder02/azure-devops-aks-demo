name: Azure Running Resources

on:
  workflow_dispatch:

env:
  RESOURCE_GROUP: rg-devops-demo
  AKS_NAME: aks-devops-demo

  TFSTATE_RG: rg-tf-backend
  TFSTATE_STORAGE: agtfstate2026xyz
  TFSTATE_CONTAINER: tfstate

jobs:

  audit:

    runs-on: ubuntu-latest

    steps:

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Terraform Backend
        run: |
          az storage account show \
            --resource-group rg-tf-backend \
            --name agtfstate2026xyz \
            --output table

      - name: Azure Running Resources
        run: |

          echo ""
          echo "========================================================"
          echo "            AZURE RUNNING RESOURCES"
          echo "========================================================"

          echo ""
          echo "Subscription"
          echo "--------------------------------------------------------"

          az account show \
            --query "{Name:name,Subscription:id}" \
            -o table

          echo ""
          echo "Infrastructure"
          echo "--------------------------------------------------------"

          RG_EXISTS=$(az group exists --name ${{ secrets.RESOURCE_GROUP }})

          if [ "$RG_EXISTS" = "true" ]; then

            echo ""
            echo "✅ Resource Group : ${{ secrets.RESOURCE_GROUP }}"

            az group show \
              --name ${{ secrets.RESOURCE_GROUP }} \
              --query "{Name:name,Location:location,ProvisioningState:properties.provisioningState}" \
              -o table

            echo ""
            echo "AKS Cluster"
            echo "-------------------------------------------------------"
            az aks list \
              --resource-group ${{ secrets.RESOURCE_GROUP }} \
              --query "[].{Name:name,Location:location,Version:kubernetesVersion}" \
              -o table || true

            echo ""
            echo "Azure Container Registry"
            echo "-------------------------------------------------------"
            az acr list \
              --resource-group ${{ secrets.RESOURCE_GROUP }} \
              --query "[].{Name:name,SKU:sku.name}" \
              -o table || true

            echo ""
            echo "Key Vault"
            echo "-------------------------------------------------------"
            az keyvault list \
              --resource-group ${{ secrets.RESOURCE_GROUP }} \
              --query "[].{Name:name}" \
              -o table || true

          else

            echo ""
            echo "❌ Resource Group : Not Found"
            echo "❌ AKS Cluster    : Not Found"
            echo "❌ ACR            : Not Found"
            echo "❌ Key Vault      : Not Found"

          fi


          echo ""
          echo "Managed Identities"
          echo "--------------------------------------------------------"

          az identity list \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --query "[].{Name:name}" \
            -o table || true


          echo ""
          echo "Networking"
          echo "--------------------------------------------------------"

          if [ "$RG_EXISTS" = "true" ]; then

            NODE_RG=$(az aks show \
              --resource-group ${{ secrets.RESOURCE_GROUP }} \
              --name ${{ secrets.AKS_CLUSTER }} \
              --query nodeResourceGroup \
              -o tsv 2>/dev/null)

            if [ -n "$NODE_RG" ]; then

              echo ""
              echo "Load Balancers"
              echo "--------------------------------------------------------"

              az network lb list \
                --resource-group $NODE_RG \
                --query "[].{Name:name,Location:location}" \
                -o table || true

              echo ""
              echo "Public IP Addresses"
              echo "--------------------------------------------------------"

              az network public-ip list \
                --resource-group $NODE_RG \
                --query "[].{Name:name,IP:ipAddress}" \
                -o table || true

              echo ""
              echo "Virtual Networks"
              echo "--------------------------------------------------------"

              az network vnet list \
                --resource-group $NODE_RG \
                --query "[].{Name:name,Location:location}" \
                -o table || true

              echo ""
              echo "Network Security Groups"
              echo "--------------------------------------------------------"

              az network nsg list \
                --resource-group $NODE_RG \
                --query "[].{Name:name}" \
                -o table || true

              echo ""
              echo "Managed Disks"
              echo "--------------------------------------------------------"

              az disk list \
                --resource-group $NODE_RG \
                --query "[].{Name:name,Size:diskSizeGb}" \
                -o table || true

            else

              echo "❌ AKS Node Resource Group not found."

            fi

          else

            echo "❌ Networking resources not found."

          fi

          ####################################################
          # Terraform Backend
          ####################################################

          echo ""
          echo "Terraform Backend"
          echo "--------------------------------------------------------"

          TF_RG_EXISTS=$(az group exists --name $TFSTATE_RG)

          if [ "$TF_RG_EXISTS" = "true" ]; then

            echo ""
            echo "Backend Resource Group"
            echo "--------------------------------------------------------"

            az group show \
              --name $TFSTATE_RG \
              --query "{Name:name,Location:location}" \
              -o table || true

            echo ""
            echo "Storage Account"
            echo "--------------------------------------------------------"

            az storage account show \
              --resource-group $TFSTATE_RG \
              --name $TFSTATE_STORAGE \
              --query "{Name:name,Location:primaryLocation,SKU:sku.name}" \
              -o table || true

            echo ""
            echo "Blob Containers"
            echo "--------------------------------------------------------"

            ACCOUNT_KEY=$(az storage account keys list \
              --resource-group $TFSTATE_RG \
              --account-name $TFSTATE_STORAGE \
              --query "[0].value" \
              -o tsv)

            az storage container list \
              --account-name $TFSTATE_STORAGE \
              --account-key "$ACCOUNT_KEY" \
              --query "[].{Container:name}" \
              -o table || true

            echo ""
            echo "Terraform State Files"
            echo "--------------------------------------------------------"

            az storage blob list \
              --account-name $TFSTATE_STORAGE \
              --container-name $TFSTATE_CONTAINER \
              --account-key "$ACCOUNT_KEY" \
              --query "[].{Name:name,Size:properties.contentLength}" \
              -o table || true

          else

            echo "❌ Terraform Backend Resource Group : Not Found"

          fi

          COST_COUNT=0

          ####################################################
          # Cost Analysis
          ####################################################

          echo ""
          echo "Cost Analysis"
          echo "--------------------------------------------------------"

          if [ "$RG_EXISTS" = "true" ] && [ -n "$NODE_RG" ]; then


            # Load Balancer
            LB_COUNT=$(az network lb list \
              --resource-group "$NODE_RG" \
              --query "length(@)" \
              -o tsv 2>/dev/null || echo 0)

            if [ "$LB_COUNT" -gt 0 ]; then
              echo "⚠ Load Balancer(s) Found : $LB_COUNT"
              COST_COUNT=$((COST_COUNT + LB_COUNT))
            else
              echo "✅ No Load Balancer"
            fi

            # Public IP
            PIP_COUNT=$(az network public-ip list \
              --resource-group "$NODE_RG" \
              --query "length(@)" \
              -o tsv 2>/dev/null || echo 0)

            if [ "$PIP_COUNT" -gt 0 ]; then
              echo "⚠ Public IP(s) Found : $PIP_COUNT"
              COST_COUNT=$((COST_COUNT + PIP_COUNT))
            else
              echo "✅ No Public IP"
            fi

            # Managed Disks
            DISK_COUNT=$(az disk list \
              --resource-group "$NODE_RG" \
              --query "length(@)" \
              -o tsv 2>/dev/null || echo 0)

            if [ "$DISK_COUNT" -gt 0 ]; then
              echo "⚠ Managed Disk(s) Found : $DISK_COUNT"
              COST_COUNT=$((COST_COUNT + DISK_COUNT))
            else
              echo "✅ No Managed Disks"
            fi

          else

            echo "Platform infrastructure not found."
            echo "No project cost resources detected."

          fi

          ####################################################
          # Summary
          ####################################################

          echo ""
          echo "========================================================"
          echo "Summary"
          echo "========================================================"

          if [ "$RG_EXISTS" = "true" ]; then
            PLATFORM_STATUS="ACTIVE"
          else
            PLATFORM_STATUS="DESTROYED"
          fi

          TOTAL_RESOURCES=$(az resource list \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --query "length(@)" \
            -o tsv 2>/dev/null || echo 0)

          echo "Platform Status          : $PLATFORM_STATUS"
          echo "Azure Resources          : $TOTAL_RESOURCES"
          echo "Potential Cost Resources : $COST_COUNT"

          if [ "$COST_COUNT" -gt 0 ]; then
            echo "Recommendation           : Run 'Destroy Platform' if these resources are no longer required."
          else
            echo "Recommendation           : No project cost resources detected."
          fi

          echo "========================================================"
          echo "Audit Completed"
          echo "========================================================"