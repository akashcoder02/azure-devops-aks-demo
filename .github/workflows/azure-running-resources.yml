name: Azure Running Resources

on:
  workflow_dispatch:

env:
  RESOURCE_GROUP: rg-devops-demo

  TFSTATE_RG: rg-tf-backend
  TFSTATE_STORAGE: agtfstate2026xyz
  TFSTATE_CONTAINER: tfstate

jobs:

  audit:

    runs-on: ubuntu-latest

    steps:

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Azure Running Resources
        run: |

          echo ""
          echo "========================================================"
          echo "            AZURE RUNNING RESOURCES"
          echo "========================================================"

          echo ""
          echo "Subscription"
          echo "--------------------------------------------------------"

          az account show \
            --query "{Name:name,Subscription:id}" \
            -o table

          echo ""
          echo "Infrastructure"
          echo "--------------------------------------------------------"

          RG_EXISTS=$(az group exists --name $RESOURCE_GROUP)

          if [ "$RG_EXISTS" = "true" ]; then

            echo ""
            echo "✅ Resource Group : $RESOURCE_GROUP"

            az group show \
              --name $RESOURCE_GROUP \
              --query "{Name:name,Location:location,ProvisioningState:properties.provisioningState}" \
              -o table

            echo ""
            echo "AKS Cluster"
            echo "-------------------------------------------------------"
            az aks list \
              --resource-group $RESOURCE_GROUP \
              --query "[].{Name:name,Location:location,Version:kubernetesVersion}" \
              -o table || true

            echo ""
            echo "Azure Container Registry"
            echo "-------------------------------------------------------"
            az acr list \
              --resource-group $RESOURCE_GROUP \
              --query "[].{Name:name,SKU:sku.name}" \
              -o table || true

            echo ""
            echo "Key Vault"
            echo "-------------------------------------------------------"
            az keyvault list \
              --resource-group $RESOURCE_GROUP \
              --query "[].{Name:name}" \
              -o table || true

          else

            echo ""
            echo "❌ Resource Group : Not Found"
            echo "❌ AKS Cluster    : Not Found"
            echo "❌ ACR            : Not Found"
            echo "❌ Key Vault      : Not Found"

          fi