name: GitOps Deploy

on:

  workflow_dispatch:
    inputs:

      application_name:
        description: "Application"
        required: true
        default: "tic-tac-toe"
        type: choice
        options:
          - tic-tac-toe
          - tetris

      image_tag:
        description: "Docker Image Tag"
        required: true

      environment:
        description: "Environment"
        required: true
        default: "development"
        type: choice
        options:
          - development
          - production

      deployment_type:
        description: "Deployment Type"
        required: true
        default: "default"
        type: choice
        options:
          - default
          - hpa

  workflow_call:

    inputs:

      application_name:
        description: "Application"
        required: true
        type: string

      image_tag:
        description: "Docker Image Tag"
        required: true
        type: string

      environment:
        description: "Environment"
        required: true
        type: string

      deployment_type:
        required: true
        type: string

env:
  APPLICATION_NAME: ${{ inputs.application_name || github.event.inputs.application_name }}

  IMAGE_TAG: ${{ inputs.image_tag || github.event.inputs.image_tag }}

jobs:

  gitops-deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Start SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Verify Azure Login
        run: |
          az account show

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Configure SSH Remote
        run: |
          git remote set-url origin git@github.com:akashcoder02/azure-devops-aks-demo.git

          git remote -v

      - name: Verify AKS Cluster
        run: |
          echo "Checking AKS Cluster..."

          az aks show \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER }} \
            --output table

      - name: Get AKS Credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER }} \
            --overwrite-existing

      - name: Get AKS Key Vault Identity
        run: |
          if [ -f gitops/applications/${{ env.APPLICATION_NAME }}/secretproviderclass.yaml ]; then

            AKS_CLIENT_ID=$(az aks show \
              --resource-group ${{ secrets.RESOURCE_GROUP }} \
              --name ${{ secrets.AKS_CLUSTER }} \
              --query addonProfiles.azureKeyvaultSecretsProvider.identity.clientId \
              -o tsv)
            
            echo "AKS Client ID : $AKS_CLIENT_ID"

            echo "AKS_CLIENT_ID=$AKS_CLIENT_ID" >> $GITHUB_ENV

          fi
      
      - name: Verify Image Exists in ACR
        run: |

          az acr repository show-tags \
            --name ${{ secrets.ACR_NAME }} \
            --repository ${{ env.APPLICATION_NAME }} \
            --output tsv | grep "^${{ env.IMAGE_TAG }}$"

          echo "Image exists in ACR."  

      - name: Update GitOps Manifests
        run: |

          sed -i \
          "s|image:.*|image: ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.APPLICATION_NAME }}:${{ env.IMAGE_TAG }}|g" \
          gitops/applications/${{ env.APPLICATION_NAME }}/deployment.yaml

          if [ -f gitops/applications/${{ env.APPLICATION_NAME }}/secretproviderclass.yaml ]; then

            sed -i \
            "s|userAssignedIdentityID:.*|userAssignedIdentityID: ${AKS_CLIENT_ID}|g" \
            gitops/applications/${{ env.APPLICATION_NAME }}/secretproviderclass.yaml

          fi

      - name: Configure Deployment Mode
        run: |
          chmod +x scripts/deployment/deployment-mode.sh

          ./scripts/deployment/deployment-mode.sh \
            "${{ inputs.deployment_type }}" \
            "${{ env.APPLICATION_NAME }}"

      - name: Show Updated Manifests
        run: |

          echo "================ Deployment ================"
          cat gitops/applications/${{ env.APPLICATION_NAME }}/deployment.yaml

          if [ -f gitops/applications/${{ env.APPLICATION_NAME }}/secretproviderclass.yaml ]; then

            echo ""
            echo "============ SecretProviderClass ============"
            cat gitops/applications/${{ env.APPLICATION_NAME }}/secretproviderclass.yaml
          fi

      - name: Commit Changes
        run: |

          git add gitops/

          if git diff --cached --quiet; then

            echo "No changes detected."

          else

            git commit -m \
            "GitOps: Deploy ${{ env.APPLICATION_NAME }} (${{ env.IMAGE_TAG }})"

          fi

      - name: Push Changes
        run: |
          git push origin main

      - name: Verify Argo CD Installation
        run: |
          kubectl get namespace argocd

          kubectl get deployment argocd-server -n argocd
        
      - name: Create Argo CD Application
        run: |

          if kubectl get application ${{ env.APPLICATION_NAME }} -n argocd >/dev/null 2>&1; then

            echo "Application already exists."

          else

            echo "Creating Argo CD Application..."

            kubectl apply \
              -f gitops/projects/${{ env.APPLICATION_NAME }}.yaml

          fi

      - name: Wait for Argo CD Sync
        run: |

          kubectl wait \
            --for=jsonpath='{.status.sync.status}'=Synced \
            application/${{ env.APPLICATION_NAME }} \
            -n argocd \
            --timeout=300s

          kubectl wait \
            --for=jsonpath='{.status.health.status}'=Healthy \
            application/${{ env.APPLICATION_NAME }} \
            -n argocd \
            --timeout=300s || true

      - name: Wait for Deployment Rollout
        run: |

          kubectl rollout status \
            deployment/${{ env.APPLICATION_NAME }} \
            --timeout=300s

      - name: Update Deployment History
        continue-on-error: true
        run: |

          CURRENT_IMAGE=$(kubectl get deployment \
            ${{ env.APPLICATION_NAME }} \
            -o jsonpath='{.spec.template.spec.containers[0].image}')

          CURRENT_REPLICAS=$(kubectl get deployment \
            ${{ env.APPLICATION_NAME }} \
            -o jsonpath='{.spec.replicas}')

          echo "$(date '+%Y-%m-%d %H:%M:%S'),${{ env.APPLICATION_NAME }},Release,$CURRENT_IMAGE,NA,$CURRENT_REPLICAS,${{ github.sha }},${{ github.workflow }},${{ github.actor }},Success,Application Released" >> history/deployment-history.csv

      - name: Commit Deployment History
        continue-on-error: true
        run: |

          git add history/deployment-history.csv

          if git diff --cached --quiet; then
            echo "No deployment history changes."
            exit 0
          fi

          git commit -m "Update deployment history"

          git pull --rebase origin main

          git push origin HEAD:main
      
      - name: GitOps Deployment Summary
        run: |

          echo ""
          echo "========================================================"
          echo "GITOPS DEPLOYMENT COMPLETED"
          echo "========================================================"

          echo ""
          echo "Application : ${{ env.APPLICATION_NAME }}"
          echo "Image Tag   : ${{ env.IMAGE_TAG }}"
          echo "Deployment  : ${{ inputs.deployment_type }}"

          if [ "${{ inputs.deployment_type }}" = "hpa" ]; then
            echo "Autoscaling : Enabled"
          else
            echo "Autoscaling : Disabled"
          fi

          echo ""
          echo "Argo CD Application"

          kubectl get application \
            ${{ env.APPLICATION_NAME }} \
            -n argocd

          echo ""
          echo "========================================================"
