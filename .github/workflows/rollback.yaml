name: Rollback Deployment

on:
  workflow_dispatch:
    inputs:

      application_name:
        description: "Application Name"
        required: true
        default: "tic-tac-toe"
        type: choice
        options:
          - tic-tac-toe
          - tetris

      image_tag:
        description: "Docker Image Tag"
        required: true

jobs:

  rollback:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Verify AKS Exists
        run: |
          echo "Checking AKS Cluster..."

          az aks show \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER }} \
            --output table

      - name: Get AKS Credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER }} \
            --overwrite-existing

      - name: Verify Image Exists in ACR
        run: |

          az acr repository show-tags \
            --name ${{ secrets.ACR_NAME }} \
            --repository ${{ github.event.inputs.application_name }} \
            --output tsv | grep "^${{ github.event.inputs.image_tag }}$"

          echo "Rollback image exists in ACR."

      - name: Rollback Deployment
        run: |
          kubectl set image deployment/${{ github.event.inputs.application_name }} \
          ${{ github.event.inputs.application_name }}=${{ secrets.ACR_NAME }}.azurecr.io/${{ github.event.inputs.application_name }}:${{ github.event.inputs.image_tag }}

      - name: Wait for Rollout
        run: |
          kubectl rollout status deployment/${{ github.event.inputs.application_name }} --timeout=300s

      - name: Verify Rollback
        run: |
          echo "Deployment"
          kubectl get deployment ${{ github.event.inputs.application_name }}

          echo ""
          echo "Pods"
          kubectl get pods -l app=${{ github.event.inputs.application_name }}

          echo ""
          echo "Current Image"
          kubectl get deployment ${{ github.event.inputs.application_name }} \
            -o jsonpath='{.spec.template.spec.containers[0].image}'


      - name: Rollback Summary
        run: |

          echo ""
          echo "========================================================"
          echo "ROLLBACK COMPLETED SUCCESSFULLY"
          echo "========================================================"

          echo ""
          echo "Application : ${{ github.event.inputs.application_name }}"
          echo "Image Tag   : ${{ github.event.inputs.image_tag }}"

          echo ""
          kubectl get deployment ${{ github.event.inputs.application_name }}

          echo ""
          echo "========================================================"