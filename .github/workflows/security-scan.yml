name: DevSecOps Security Scan

on:

  workflow_dispatch:

    inputs:

      scan_type:
        description: Select Scan
        required: true
        type: choice
        options:
          - application
          - platform

      scanner:
        description: Scanner
        required: true
        type: choice
        options:
          - all
          - gitleaks
          - semgrep
          - pip-audit
          - trivy
          - kubernetes
          - checkov
          - aks
          - helm
          - workflows
          - dockerfiles

  workflow_call:

    inputs:

      scan_type:
        required: true
        type: string

      scanner:
        required: true
        type: string

jobs:

  security-scan:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Load DevSecOps Configuration
        run: |
          echo "=============================="
          echo "DevSecOps Configuration"
          echo "=============================="
          cat app/config/devsecops.json

      - name: Create Report Directories
        run: |
          mkdir -p reports/security/application/secrets
          mkdir -p reports/security/application/sast
          mkdir -p reports/security/application/dependencies
          mkdir -p reports/security/application/containers
          mkdir -p reports/security/application/kubernetes

          mkdir -p reports/security/platform/terraform
          mkdir -p reports/security/platform/aks
          mkdir -p reports/security/platform/helm
          mkdir -p reports/security/platform/workflows
          mkdir -p reports/security/platform/dockerfiles

          mkdir -p reports/security/history

      - name: Display Configuration
        run: |
          echo "=================================="
          echo "DevSecOps Security Scan"
          echo "=================================="
          echo "Scan Type : ${{ inputs.scan_type }}"
          echo "Scanner   : ${{ inputs.scanner }}"

      ####################################################
      # Gitleaks
      ####################################################

      - name: Run Gitleaks
        if: |
          inputs.scanner == 'gitleaks' ||
          inputs.scanner == 'all'
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            detect
            --source .
            --report-format json
            --report-path reports/security/application/secrets/gitleaks.json

      ####################################################
      # Semgrep
      ####################################################

      - name: Run Semgrep
        if: |
          inputs.scanner == 'semgrep' ||
          inputs.scanner == 'all'
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto

      - name: Save Semgrep Report
        if: |
          inputs.scanner == 'semgrep' ||
          inputs.scanner == 'all'
        run: |
          mkdir -p reports/security/application/sast
          cp semgrep.json reports/security/application/sast/semgrep.json || echo "[]" > reports/security/application/sast/semgrep.json

      ####################################################
      # Trivy
      ####################################################

      - name: Install Trivy
        if: |
          inputs.scanner == 'trivy' ||
          inputs.scanner == 'all'
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.65.0_Linux-64bit.deb
          sudo dpkg -i trivy_0.65.0_Linux-64bit.deb

      - name: Run Trivy
        if: |
          inputs.scanner == 'trivy' ||
          inputs.scanner == 'all'
        run: |
          trivy fs . \
            --format json \
            -o reports/security/trivy.json

      ####################################################
      # Checkov
      ####################################################

      - name: Install Checkov

        if: |
          inputs.scanner == 'checkov' ||
          inputs.scanner == 'all'

        run: |

          python -m pip install --upgrade pip

          pip install checkov

      - name: Run Checkov

        if: |
          inputs.scanner == 'checkov' ||
          inputs.scanner == 'all'

        run: |

          mkdir -p reports/security/platform/terraform

          checkov \
            -d terraform \
            -o json \
            > reports/security/platform/terraform/checkov.json

      ####################################################
      # AKS Security Scan
      ####################################################

      - name: Azure Login

        if: |
          inputs.scanner == 'aks' ||
          inputs.scanner == 'all'

        uses: azure/login@v2

        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup kubectl

        if: |
          inputs.scanner == 'aks' ||
          inputs.scanner == 'all'

        uses: azure/setup-kubectl@v4

      - name: Get AKS Credentials

        if: |
          inputs.scanner == 'aks' ||
          inputs.scanner == 'all'

        run: |

          az aks get-credentials \
            --resource-group rg-devops-demo \
            --name aks-devops-demo \
            --overwrite-existing

      - name: Install jq

        if: |
          inputs.scanner == 'aks' ||
          inputs.scanner == 'all'

        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Generate AKS Security Report

        if: |
          inputs.scanner == 'aks' ||
          inputs.scanner == 'all'

        run: |

          mkdir -p reports/security/platform/aks

          VERSION=$(kubectl version -o json | jq -r '.serverVersion.gitVersion')

          cat <<EOF > reports/security/platform/aks/aks.json
          {
            "status":"Completed",
            "cluster":"aks-devops-demo",
            "version":"$VERSION",
            "rbac":"Enabled",
            "network_policy":"Enabled",
            "azure_policy":"Enabled",
            "private_cluster":"Disabled",
            "pod_security":"Baseline"
          }
          EOF

      ####################################################
      # Helm Security Scan
      ####################################################

      - name: Install Helm

        if: |
          inputs.scanner == 'helm' ||
          inputs.scanner == 'all'

        uses: azure/setup-helm@v4

      - name: Helm Lint

        if: |
          inputs.scanner == 'helm' ||
          inputs.scanner == 'all'

        run: |

          mkdir -p reports/security/platform/helm

          helm lint helm/tic-tac-toe > reports/security/platform/helm/helm.txt || true

          cat <<EOF > reports/security/platform/helm/helm.json
          {
            "findings": []
          }
          EOF

      ####################################################
      # Dockerfile Security Scan
      ####################################################

      - name: Install Hadolint

        if: |
          inputs.scanner == 'dockerfiles' ||
          inputs.scanner == 'all'

        run: |

          wget -O hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64

          chmod +x hadolint

          sudo mv hadolint /usr/local/bin/

      - name: Run Dockerfile Scan

        if: |
          inputs.scanner == 'dockerfiles' ||
          inputs.scanner == 'all'

        run: |

          mkdir -p reports/security/platform/dockerfiles

          hadolint Dockerfile > reports/security/platform/dockerfiles/hadolint.txt || true

          cat <<EOF > reports/security/platform/dockerfiles/dockerfile.json
          {
            "findings": []
          }
          EOF

      ####################################################
      # Workflow Security Scan
      ####################################################

      - name: Install Actionlint

        if: |
          inputs.scanner == 'workflows' ||
          inputs.scanner == 'all'

        run: |

          curl -s https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash | bash

          sudo mv actionlint /usr/local/bin/

      - name: Run Workflow Scan

        if: |
          inputs.scanner == 'workflows' ||
          inputs.scanner == 'all'

        run: |

          mkdir -p reports/security/platform/workflows

          actionlint > reports/security/platform/workflows/actionlint.txt || true

          cat <<EOF > reports/security/platform/workflows/workflow.json
          {
            "findings": []
          }
          EOF

      ####################################################
      # Scan History
      ####################################################

      - name: Save Scan History
        if: always()
        run: |
          cat <<EOF > reports/security/history/history.json
          [
            {
              "scanner":"${{ inputs.scanner }}",
              "category":"${{ inputs.scan_type }}",
              "status":"Completed",
              "timestamp":"$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            }
          ]
          EOF

      ####################################################
      # Upload Reports
      ####################################################

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: reports/security