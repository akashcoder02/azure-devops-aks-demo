name: DevSecOps Security Scan

on:

  workflow_dispatch:

    inputs:

      scan_type:
        description: Select Scan
        required: true
        type: choice
        options:
          - application
          - platform

      scanner:
        description: Scanner
        required: true
        type: choice
        options:
          - all
          - gitleaks
          - semgrep
          - pip-audit
          - trivy
          - kubernetes
          - checkov
          - aks
          - helm
          - workflows
          - dockerfiles

  workflow_call:

    inputs:

      scan_type:
        required: true
        type: string

      scanner:
        required: true
        type: string

jobs:

  security-scan:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Load DevSecOps Configuration
        run: |
          echo "=============================="
          echo "DevSecOps Configuration"
          echo "=============================="
          cat app/config/devsecops.json

      - name: Create Report Directories
        run: |
          mkdir -p reports/security/application/secrets
          mkdir -p reports/security/application/sast
          mkdir -p reports/security/application/dependencies
          mkdir -p reports/security/application/containers
          mkdir -p reports/security/application/kubernetes

          mkdir -p reports/security/platform/terraform
          mkdir -p reports/security/platform/aks
          mkdir -p reports/security/platform/helm
          mkdir -p reports/security/platform/workflows
          mkdir -p reports/security/platform/dockerfiles

          mkdir -p reports/security/history

      - name: Display Configuration
        run: |
          echo "=================================="
          echo "DevSecOps Security Scan"
          echo "=================================="
          echo "Scan Type : ${{ inputs.scan_type }}"
          echo "Scanner   : ${{ inputs.scanner }}"

      ####################################################
      # Gitleaks
      ####################################################

      - name: Run Gitleaks
        if: |
          inputs.scanner == 'gitleaks' ||
          inputs.scanner == 'all'
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            detect
            --source .
            --report-format json
            --report-path reports/security/application/secrets/gitleaks.json

      ####################################################
      # Semgrep
      ####################################################

      - name: Run Semgrep
        if: |
          inputs.scanner == 'semgrep' ||
          inputs.scanner == 'all'
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto

      - name: Save Semgrep Report
        if: |
          inputs.scanner == 'semgrep' ||
          inputs.scanner == 'all'
        run: |
          mkdir -p reports/security/application/sast
          cp semgrep.json reports/security/application/sast/semgrep.json || echo "[]" > reports/security/application/sast/semgrep.json

      ####################################################
      # Trivy
      ####################################################

      - name: Install Trivy
        if: |
          inputs.scanner == 'trivy' ||
          inputs.scanner == 'all'
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.65.0_Linux-64bit.deb
          sudo dpkg -i trivy_0.65.0_Linux-64bit.deb

      - name: Run Trivy
        if: |
          inputs.scanner == 'trivy' ||
          inputs.scanner == 'all'
        run: |
          trivy fs . \
            --format json \
            -o reports/security/trivy.json

      ####################################################
      # Scan History
      ####################################################

      - name: Save Scan History
        if: always()
        run: |
          cat <<EOF > reports/security/history/history.json
          [
            {
              "scanner":"${{ inputs.scanner }}",
              "category":"${{ inputs.scan_type }}",
              "status":"Completed",
              "timestamp":"$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            }
          ]
          EOF

      ####################################################
      # Upload Reports
      ####################################################

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: reports/security