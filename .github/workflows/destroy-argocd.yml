name: Destroy Argo CD

on:
  workflow_dispatch:

env:
  RESOURCE_GROUP: rg-devops-demo
  AKS_NAME: aks-devops-demo

jobs:

  destroy-argocd:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform/addons/argocd

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Verify AKS Cluster
        run: |
          az aks show \
            --resource-group $RESOURCE_GROUP \
            --name $AKS_NAME \
            --output table

      - name: Get AKS Credentials
        run: |
          az aks get-credentials \
            --resource-group $RESOURCE_GROUP \
            --name $AKS_NAME \
            --overwrite-existing

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan Destroy
        run: terraform plan -destroy

      - name: Terraform Destroy
        run: terraform destroy -auto-approve

      - name: Verify Removal
        run: |
          kubectl get namespace argocd || true

      - name: Destroy Summary
        run: |
          echo ""
          echo "========================================"
          echo "ARGO CD DESTROY COMPLETED"
          echo "========================================"
          echo ""
          echo "Namespace:"
          kubectl get namespace argocd || echo "Namespace removed."
          echo ""
          echo "========================================"
