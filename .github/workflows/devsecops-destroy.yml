name: Uninstall DevSecOps

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:

  destroy-devsecops:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform/addons/devsecops

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: terraform destroy -auto-approve

      - name: Uninstall Complete
        run: |
          echo "==============================="
          echo " DevSecOps Removed"
          echo "==============================="
