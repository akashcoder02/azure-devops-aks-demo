name: Platform Status

on:
  workflow_dispatch:

jobs:

  status:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Platform Status
        run: |

          echo "========== Azure =========="

          echo ""
          echo "Resource Group"
          az group show \
            --name ${{ secrets.RESOURCE_GROUP }} \
            --query name \
            -o table

          echo ""
          echo "AKS"
          az aks show \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER }} \
            --query provisioningState \
            -o table

          echo ""
          echo "ACR"
          az acr show \
            --name ${{ secrets.ACR_NAME }} \
            --query loginServer \
            -o table

          echo ""
          echo "Key Vault"
          az keyvault show \
            --name ${{ secrets.KEYVAULT_NAME }} \
            --query properties.vaultUri \
            -o table

      - name: Get AKS Credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER }} \
            --overwrite-existing

      - name: Kubernetes Status
        run: |

          echo "========== Kubernetes =========="

          echo ""
          echo "Nodes"
          kubectl get nodes

          echo ""
          echo "Deployments"
          kubectl get deployment

          echo ""
          echo "Pods"
          kubectl get pods

          echo ""
          echo "Services"
          kubectl get svc

          echo ""
          echo "Ingress"
          kubectl get ingress

      - name: Platform Status Summary
        run: |
          echo ""
          echo "Platform Status Check Completed."