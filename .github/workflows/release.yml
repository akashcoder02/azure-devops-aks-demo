name: Release Application

on:
  workflow_dispatch:
    inputs:

      application_name:
        description: "Application"
        required: true
        default: "tic-tac-toe"
        type: choice
        options:
          - tic-tac-toe
          - tetris

      environment:
        description: "Environment"
        required: true
        default: "development"
        type: choice
        options:
          - development
          - production

      deployment_strategy:
        description: "Deployment Strategy"
        required: true
        default: "gitops"
        type: choice
        options:
          - traditional
          - gitops

      deployment_type:
        description: "Deployment Type"
        required: true
        default: "default"
        type: choice
        options:
          - default
          - hpa

      enable_devsecops:
        description: Enable DevSecOps Scan
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:


  build:

    uses: ./.github/workflows/build.yaml

    secrets: inherit

    with:
      application_name: ${{ github.event.inputs.application_name }}

  
  security:

    if: ${{ github.event.inputs.enable_devsecops == 'true' }}

    needs: build

    uses: ./.github/workflows/security-scan.yml

    secrets: inherit

    with:
      scan_type: application
      scanner: all

  release-gate:

    if: ${{ github.event.inputs.enable_devsecops == 'true' }}

    needs: security

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Evaluate Release Gate
        run: |
          echo "Evaluating DevSecOps Policy..."
          python app/security/policies/policy_engine.py

  traditional-deploy:

    needs:
      - build
      - release-gate

    if: >
      github.event.inputs.deployment_strategy == 'traditional' &&
      (
        github.event.inputs.enable_devsecops == 'false' ||
        needs.release-gate.result == 'success'
      )

    uses: ./.github/workflows/deploy.yml

    secrets: inherit

    with:
      application_name: ${{ needs.build.outputs.application_name }}
      image_tag: ${{ needs.build.outputs.image_tag }}
      environment: ${{ github.event.inputs.environment }}
      deployment_type: ${{ github.event.inputs.deployment_type }}


  gitops-deploy:

    needs:
      - build
      - release-gate

    if: >
      github.event.inputs.deployment_strategy == 'traditional' &&
      (
        github.event.inputs.enable_devsecops == 'false' ||
        needs.release-gate.result == 'success'
      )

    uses: ./.github/workflows/gitops-deploy.yml

    secrets: inherit

    with:
      application_name: ${{ needs.build.outputs.application_name }}
      image_tag: ${{ needs.build.outputs.image_tag }}
      environment: ${{ github.event.inputs.environment }}
      deployment_type: ${{ github.event.inputs.deployment_type }}

  