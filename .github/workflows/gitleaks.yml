name: Gitleaks Security Scan

on:
  workflow_dispatch:

  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: Secrets Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            detect
            --source .
            --report-format json
            --report-path reports/security/gitleaks.json

      - name: Upload Gitleaks Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: reports/security/gitleaks.json

      - name: Security Scan Summary
        if: always()
        run: |
          echo "================================="
          echo " GITLEAKS SECURITY SCAN COMPLETE "
          echo "================================="
          ls -lh reports/security || true