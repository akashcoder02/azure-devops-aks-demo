name: Gitleaks Security Scan

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Application Secrets Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Report Directory
        run: |
          mkdir -p reports/security/application/secrets

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            detect
            --source .
            --report-format json
            --report-path reports/security/application/secrets/gitleaks.json

      - name: Upload Gitleaks Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: reports/security/application/secrets/gitleaks.json

      - name: Security Scan Summary
        if: always()
        run: |
          echo "=============================="
          echo " Application Secrets Scan"
          echo "=============================="
          ls -R reports/security || true