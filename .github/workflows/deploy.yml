name: Deploy to AKS

on:
  workflow_run:
    workflows:
      - "Build Docker Image"
    types:
      - completed

env:
  IMAGE_NAME: tic-tac-toe
  DEPLOYMENT_NAME: tic-tac-toe
  SERVICE_NAME: tic-tac-toe

jobs:
  deploy:

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS Credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER }} \
            --overwrite-existing

      - name: Generate Kubernetes Manifest
        run: |
          mkdir -p build

          cp applications/tic-tac-toe/k8s/deployment.yaml build/deployment.yaml

          sed -i \
          "s|IMAGE_PLACEHOLDER|${{ secrets.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.event.workflow_run.head_sha }}|g" \
          build/deployment.yaml

      - name: Deploy Application
        run: |
          kubectl apply -f build/deployment.yaml
          kubectl apply -f applications/tic-tac-toe/k8s/service.yaml
          kubectl apply -f applications/tic-tac-toe/k8s/ingress.yaml

      - name: Wait for Rollout
        run: |
          kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} --timeout=300s

      - name: Verify Deployment
        run: |
          echo "Deployments"
          kubectl get deployment ${{ env.DEPLOYMENT_NAME }}

          echo ""
          echo "Pods"
          kubectl get pods -l app=tic-tac-toe

          echo ""
          echo "Services"
          kubectl get svc ${{ env.SERVICE_NAME }}

      - name: Get Ingress URL
        run: |
          INGRESS_IP=""

          for i in {1..30}
          do
            INGRESS_IP=$(kubectl get svc ingress-nginx-controller \
              -n ingress-nginx \
              -o jsonpath='{.status.loadBalancer.ingress[0].ip}')

            if [ -n "$INGRESS_IP" ]; then
              break
            fi

            sleep 10
          done

          echo ""
          echo "Application URL"

          if [ -n "$INGRESS_IP" ]; then
            echo "http://${INGRESS_IP}/tic-tac-toe"
          else
            echo "Ingress IP pending."
          fi

      - name: Deployment Completed
        run: |
          echo "Deployment completed successfully."