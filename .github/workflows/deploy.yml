name: Deploy to AKS

on:

  workflow_dispatch:
    inputs:

      application_name:
        description: "Application to Deploy"
        required: true
        default: "tic-tac-toe"
        type: choice
        options:
          - tic-tac-toe
          - tetris

      image_tag:
        description: "Docker Image Tag"
        required: true

  workflow_call:

    inputs:

      application_name:
        description: "Application to Deploy"
        required: true
        type: string

      image_tag:
        description: "Docker Image Tag"
        required: true
        type: string

env:
  APPLICATION_NAME: ${{ inputs.application_name || github.event.inputs.application_name }}

  IMAGE_TAG: ${{ inputs.image_tag || github.event.inputs.image_tag }}

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS Credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER }} \
            --overwrite-existing

      - name: Get AKS Key Vault Identity
        if: ${{ hashFiles(format('applications/{0}/k8s/secretproviderclass.yaml', env.APPLICATION_NAME)) != '' }}
        run: |
          echo "AKS_CLIENT_ID=$(az aks show \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER }} \
            --query addonProfiles.azureKeyvaultSecretsProvider.identity.clientId \
            -o tsv)" >> $GITHUB_ENV

      - name: Generate Kubernetes Manifests
        run: |

          mkdir -p build

          cp applications/${{ env.APPLICATION_NAME }}/k8s/deployment.yaml build/deployment.yaml

          if [ -f applications/${{ env.APPLICATION_NAME }}/k8s/secretproviderclass.yaml ]; then
            cp applications/${{ env.APPLICATION_NAME }}/k8s/secretproviderclass.yaml build/secretproviderclass.yaml
          fi

          sed -i \
          "s|IMAGE_PLACEHOLDER|${{ secrets.ACR_NAME }}.azurecr.io/${{ env.APPLICATION_NAME }}:${{ env.IMAGE_TAG }}|g" \
          build/deployment.yaml

          if [ -f build/secretproviderclass.yaml ]; then
            sed -i \
            "s|IDENTITY_PLACEHOLDER|$AKS_CLIENT_ID|g" \
            build/secretproviderclass.yaml
          fi

      - name: Show Generated Manifest
        run: |
          cat build/deployment.yaml  

      - name: Show SecretProviderClass
        run: |
          if [ -f build/secretproviderclass.yaml ]; then
            cat build/secretproviderclass.yaml
          fi

      - name: Apply SecretProviderClass
        run: |
          if [ -f build/secretproviderclass.yaml ]; then
            kubectl apply -f build/secretproviderclass.yaml
          fi

      - name: Deploy Application
        run: |
          kubectl apply -f build/deployment.yaml

          kubectl apply -f applications/${{ env.APPLICATION_NAME }}/k8s/service.yaml

          kubectl apply -f applications/${{ env.APPLICATION_NAME }}/k8s/ingress.yaml

          echo ""
          echo "Ingress"
          kubectl get ingress 

      - name: Describe Ingress
        run: |
          kubectl describe ingress

      - name: Verify Endpoints
        run: |
          echo "Endpoints"
          kubectl get endpoints

      - name: Wait for Rollout
        run: |
          kubectl rollout status deployment/${{ env.APPLICATION_NAME }} --timeout=300s

      - name: Verify ReplicaSets
        run: |
          kubectl get rs

      - name: Verify Deployment
        run: |
          echo "Deployments"
          kubectl get deployment ${{ env.APPLICATION_NAME }}

          echo ""
          echo "Pods"
          kubectl get pods -l app=${{ env.APPLICATION_NAME }}

          echo ""
          echo "Services"
          kubectl get svc ${{ env.APPLICATION_NAME }}

      - name: Verify Deployed Image
        run: |
          kubectl get deployment ${{ env.APPLICATION_NAME }} \
            -o=jsonpath='{.spec.template.spec.containers[0].image}'

          echo ""

      - name: Show Application Access
        run: |

          SERVICE_TYPE=$(kubectl get svc ingress-nginx-controller \
            -n ingress-nginx \
            -o jsonpath='{.spec.type}')

          echo ""
          echo "========================================"

          if [ "$SERVICE_TYPE" = "LoadBalancer" ]; then

            INGRESS_IP=$(kubectl get svc ingress-nginx-controller \
              -n ingress-nginx \
              -o jsonpath='{.status.loadBalancer.ingress[0].ip}')

            echo "Environment : Production"
            echo ""
            echo "Application URL:"
            echo "http://${INGRESS_IP}/${{ env.APPLICATION_NAME }}"

          else

            echo "Environment : Development"
            echo ""
            echo "Ingress Controller is ClusterIP."
            echo ""
            echo "Use port-forward:"
            echo ""
            echo "kubectl port-forward svc/ingress-nginx-controller -n ingress-nginx 8080:80"
            echo ""
            echo "Then open:"
            echo "http://localhost:8080/${{ env.APPLICATION_NAME }}"

          fi

          echo "========================================"

      - name: Deployment Summary
        run: |
          echo ""
          echo "========================================================"
          echo "DEPLOYMENT COMPLETED"
          echo "========================================================"

          echo "Application : ${{ env.APPLICATION_NAME }}"
          echo "Image Tag   : ${{ env.IMAGE_TAG }}"
          echo "Namespace   : default"

          echo ""

          kubectl get deployment ${{ env.APPLICATION_NAME }}

          echo ""
          echo "========================================================"