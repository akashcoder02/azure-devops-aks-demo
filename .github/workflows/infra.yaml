name: Platform Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment Environment"
        required: true
        default: development
        type: choice
        options:
          - development
          - production

jobs:
  terraform:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Recover Key Vault (If Deleted)
        run: |
          if az keyvault list-deleted --query "[?name=='${{ secrets.KEYVAULT_NAME }}'].name" -o tsv | grep -qx "${{ secrets.KEYVAULT_NAME }}"; then

            echo "Recovering deleted Key Vault..."

            az keyvault recover --name ${{ secrets.KEYVAULT_NAME }}

            echo "Waiting for recovery..."

            for i in {1..24}; do
              if az keyvault show --name ${{ secrets.KEYVAULT_NAME }} >/dev/null 2>&1; then
                echo "Key Vault recovered."
                exit 0
              fi

              sleep 5
            done

            echo "Recovery timed out."
            exit 1

          else
            echo "No deleted Key Vault found."
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="environment=${{ github.event.inputs.environment }}"

      - name: Terraform Apply
        run: |
          terraform apply \
            -auto-approve \
            -var="environment=${{ github.event.inputs.environment }}"

      - name: Wait for RBAC Propagation
        run: |
          echo "Waiting for Azure RBAC propagation..."
          sleep 60

      - name: Bootstrap Platform
        run: echo "Starting Platform Bootstrap..."


      - name: Create Default Secret
        run: |
          az keyvault secret set \
            --vault-name ${{ secrets.KEYVAULT_NAME }} \
            --name app-secret \
            --value "HelloFromAzureKeyVault" \
            --only-show-errors

      - name: Verify Secret
        run: |
          az keyvault secret show \
            --vault-name ${{ secrets.KEYVAULT_NAME }} \
            --name app-secret \
            --query id

      - name: Platform Summary
        run: |

          echo ""
          echo "========================================================"
          echo "PLATFORM CREATED SUCCESSFULLY"
          echo "========================================================"

          echo ""
          echo "Environment : ${{ github.event.inputs.environment }}"

          echo ""
          echo "Terraform Outputs"
          terraform output

          echo ""
          echo "========================================================"