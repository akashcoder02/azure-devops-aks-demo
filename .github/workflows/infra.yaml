name: Platform Infrastructure

on:
  workflow_dispatch:

env:
  RESOURCE_GROUP: rg-devops-demo
  AKS_NAME: aks-devops-demo
  KEYVAULT_NAME: agdevopskv2026

jobs:
  terraform:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Recover Key Vault (If Deleted)
        run: |
          if az keyvault list-deleted --query "[?name=='$KEYVAULT_NAME'].name" -o tsv | grep -qx "$KEYVAULT_NAME"; then
            echo "Recovering deleted Key Vault..."
            az keyvault recover --name $KEYVAULT_NAME
          else
            echo "No deleted Key Vault found."
          fi

      - name: Wait for Key Vault Recovery
        run: |
          for i in {1..24}; do
            if az keyvault show --name $KEYVAULT_NAME >/dev/null 2>&1; then
              echo "Key Vault is ready."
              exit 0
            fi

            echo "Waiting for Key Vault..."
            sleep 5
          done

          echo "Timed out waiting for Key Vault."
          exit 1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Platform Bootstrap
        run: echo "Starting Platform Bootstrap..."


      - name: Create Default Secret
        run: |
          az keyvault secret set \
            --vault-name $KEYVAULT_NAME \
            --name app-secret \
            --value "HelloFromAzureKeyVault" \
            --only-show-errors

      - name: Verify Secret
        run: |
          az keyvault secret show \
            --vault-name $KEYVAULT_NAME \
            --name app-secret \
            --query id

      - name: Show Outputs
        run: terraform output