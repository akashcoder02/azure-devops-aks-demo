name: GitOps Scale

on:
  workflow_dispatch:
    inputs:

      application_name:
        description: "Application"
        required: true
        default: "tic-tac-toe"
        type: choice
        options:
          - tic-tac-toe
          - tetris

      replicas:
        description: "Replica Count"
        required: true
        default: 2
        type: number

env:
  APPLICATION_NAME: ${{ github.event.inputs.application_name }}
  REPLICAS: ${{ github.event.inputs.replicas }}
  DEPLOYMENT_FILE: gitops/applications/${{ github.event.inputs.application_name }}/deployment.yaml

jobs:

  gitops-scale:

    runs-on: ubuntu-latest

    steps:

      - name: Start SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Print Workflow Inputs
        run: |

          echo "Application : ${{ github.event.inputs.application_name }}"
          echo "Replicas    : ${{ github.event.inputs.replicas }}"

          echo ""
          echo "Environment Variable"

          echo "REPLICAS=$REPLICAS"

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Configure SSH Remote
        run: |
          git remote set-url origin git@github.com:akashcoder02/azure-devops-aks-demo.git

      - name: Verify AKS
        run: |
          az aks show \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER }} \
            --output table

      - name: Get AKS Credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER }} \
            --overwrite-existing

      - name: Verify ArgoCD
        run: |
          kubectl get application \
            ${{ env.APPLICATION_NAME }} \
            -n argocd

      - name: Current Deployment
        run: |
          echo "Current replicas:"
          grep "replicas:" "${{ env.DEPLOYMENT_FILE }}"

      - name: Update Replicas
        run: |

          sed -i \
          "s/replicas: .*/replicas: ${{ env.REPLICAS }}/" \
          "${{ env.DEPLOYMENT_FILE }}"

          echo ""
          echo "Updated deployment.yaml"

          grep "replicas:" "${{ env.DEPLOYMENT_FILE }}"

      - name: Commit and Push
        run: |

          git add "${{ env.DEPLOYMENT_FILE }}"

          if git diff --cached --quiet; then
            echo ""
            echo "==============================================="
            echo "NO SCALING REQUIRED"
            echo "==============================================="
            echo ""
            echo "Application is already scaled to ${{ env.REPLICAS }} replicas."
            exit 0
          fi

          git commit -m "Scale ${{ env.APPLICATION_NAME }} to ${{ env.REPLICAS }} replicas"

          git pull --rebase origin main

          git push origin HEAD:main

      - name: Wait for ArgoCD Sync
        run: |

          for i in {1..30}
          do

            SYNC=$(kubectl get application \
              ${{ env.APPLICATION_NAME }} \
              -n argocd \
              -o jsonpath='{.status.sync.status}')

            HEALTH=$(kubectl get application \
              ${{ env.APPLICATION_NAME }} \
              -n argocd \
              -o jsonpath='{.status.health.status}')

            echo "Sync   : $SYNC"
            echo "Health : $HEALTH"

            if [ "$SYNC" = "Synced" ] && [ "$HEALTH" = "Healthy" ]; then
              break
            fi

            sleep 10

          done

      - name: Wait for Scaling
        run: |

          echo ""
          echo "==============================================="
          echo "WAITING FOR SCALING"
          echo "==============================================="

          EXPECTED="${{ env.REPLICAS }}"

          for i in {1..30}
          do

            DESIRED=$(kubectl get deployment \
              ${{ env.APPLICATION_NAME }} \
              -o jsonpath='{.status.replicas}' | xargs)

            READY=$(kubectl get deployment \
              ${{ env.APPLICATION_NAME }} \
              -o jsonpath='{.status.readyReplicas}' | xargs)

            echo "Attempt $i"
            echo "Expected : $EXPECTED"
            echo "Desired  : $DESIRED"
            echo "Ready    : $READY"

            if [[ "$DESIRED" == "$EXPECTED" && "$READY" == "$EXPECTED" ]]; then
              echo ""
              echo "Scaling completed successfully."
              exit 0
            fi

            sleep 10

          done

          echo ""
          echo "Scaling timed out."
          exit 1

      - name: Scale Summary
        run: |

          echo ""
          echo "========================================================"
          echo "GITOPS SCALE COMPLETED SUCCESSFULLY"
          echo "========================================================"

          echo ""
          echo "Application : ${{ env.APPLICATION_NAME }}"
          echo "Replicas    : ${{ env.REPLICAS }}"

          echo ""
          kubectl get deployment ${{ env.APPLICATION_NAME }}

          echo ""
          kubectl get pods -l app=${{ env.APPLICATION_NAME }}

          echo ""
          echo "========================================================"
