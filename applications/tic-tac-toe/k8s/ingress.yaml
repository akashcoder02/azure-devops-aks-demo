apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: tic-tac-toe
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2

spec:
  ingressClassName: nginx

  rules:
  - http:
      paths:
      - path: /tic-tac-toe(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: tic-tac-toe
            port:
              number: 5001